name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Ensure react-native-webview lib exists
        run: |
          RNW_DIR="node_modules/react-native-webview"
          if [ ! -d "$RNW_DIR/lib" ]; then
            echo "lib/ missing - creating stub"
            mkdir -p "$RNW_DIR/lib"
            cp -r "$RNW_DIR/src/"* "$RNW_DIR/lib/" 2>/dev/null || true
          fi
          ls "$RNW_DIR/lib" || echo "lib still missing"

      - name: Prebuild Android project
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -x test

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: telegram-chat-debug
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 7
